<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="A compact running calculator that solves distance, movement rate, and finish time from the last two values you edit."
    />
    <title>Run Pace Calculator</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="calculator-panel" aria-labelledby="app-title">
        <header class="tool-bar">
          <div class="tool-bar__top">
            <div class="tool-bar__heading">
              <div class="title-block">
                <h1 id="app-title">Run Pace Calculator</h1>
              </div>

              <p
                class="status-message"
                id="status-message"
                role="status"
                aria-live="polite"
                aria-atomic="true"
              ></p>
            </div>

            <div class="tool-bar__actions">
              <div class="segmented" aria-label="Distance unit">
                <button
                  type="button"
                  class="segmented__button is-active"
                  data-unit-button
                  data-unit="km"
                  aria-pressed="true"
                >
                  km
                </button>
                <button
                  type="button"
                  class="segmented__button"
                  data-unit-button
                  data-unit="mi"
                  aria-pressed="false"
                >
                  mi
                </button>
              </div>

              <button class="ghost-button" id="reset-button" type="button">
                Reset
              </button>
            </div>
          </div>
        </header>

        <section class="distance-card metric-card metric-card--source" id="distance-card">
          <div class="metric-card__head">
            <div class="metric-card__title">
              <p class="eyebrow">Distance</p>
              <p class="metric-card__summary" id="selected-distance">10 km</p>
            </div>
          </div>

          <div class="distance-card__body">
            <label class="field field--distance">
              <span id="distance-label">Distance (km)</span>
              <input
                id="distance-input"
                type="text"
                inputmode="decimal"
                autocomplete="off"
                spellcheck="false"
                aria-describedby="distance-error"
              />
            </label>

            <div class="preset-row" aria-label="Race presets" role="toolbar">
              <button
                type="button"
                class="chip-button"
                data-preset-button
                data-preset="5k"
                aria-pressed="false"
              >
                5K
              </button>
              <button
                type="button"
                class="chip-button"
                data-preset-button
                data-preset="10k"
                aria-pressed="true"
              >
                10K
              </button>
              <button
                type="button"
                class="chip-button"
                data-preset-button
                data-preset="half"
                aria-pressed="false"
              >
                Half
              </button>
              <button
                type="button"
                class="chip-button"
                data-preset-button
                data-preset="marathon"
                aria-pressed="false"
              >
                Marathon
              </button>
            </div>

            <input
              id="distance-slider"
              class="distance-slider"
              type="range"
              min="0.5"
              max="60"
              step="0.00001"
              aria-label="Distance slider"
              aria-describedby="distance-error"
            />

            <p class="field-error" id="distance-error" aria-live="polite"></p>
          </div>
        </section>

        <section class="metric-grid" aria-label="Calculator values">
          <section class="metric-card metric-card--source" id="rate-card">
            <div class="metric-card__head">
              <div class="metric-card__title">
                <p class="eyebrow">Movement Rate</p>
                <h2>Pace + Speed</h2>
              </div>
            </div>

            <div class="rate-grid">
              <label class="field rate-field field--active" id="pace-field">
                <span id="pace-label">Pace (min/km)</span>
                <div class="field-pair">
                  <input
                    id="pace-minutes"
                    type="text"
                    inputmode="numeric"
                    autocomplete="off"
                    spellcheck="false"
                    placeholder="min"
                    aria-describedby="pace-error"
                  />
                  <input
                    id="pace-seconds"
                    type="text"
                    inputmode="numeric"
                    autocomplete="off"
                    spellcheck="false"
                    placeholder="sec"
                    aria-describedby="pace-error"
                  />
                </div>
                <p class="field-error" id="pace-error" aria-live="polite"></p>
              </label>

              <label class="field rate-field field--linked" id="speed-field">
                <span id="speed-label">Speed (km/h)</span>
                <input
                  id="speed-input"
                  type="text"
                  inputmode="decimal"
                  autocomplete="off"
                  spellcheck="false"
                  placeholder="--.--"
                  aria-describedby="speed-error"
                />
                <p class="field-error" id="speed-error" aria-live="polite"></p>
              </label>
            </div>
          </section>

          <section class="metric-card metric-card--idle" id="time-card">
            <div class="metric-card__head">
              <div class="metric-card__title">
                <p class="eyebrow">Time</p>
                <h2>Time</h2>
              </div>
            </div>

            <div class="time-grid">
              <label class="field">
                <span>Hours</span>
                <input
                  id="time-hours"
                  type="text"
                  inputmode="numeric"
                  autocomplete="off"
                  spellcheck="false"
                  placeholder="hh"
                  aria-describedby="time-error"
                />
              </label>

              <label class="field">
                <span>Minutes</span>
                <input
                  id="time-minutes"
                  type="text"
                  inputmode="numeric"
                  autocomplete="off"
                  spellcheck="false"
                  placeholder="mm"
                  aria-describedby="time-error"
                />
              </label>

              <label class="field">
                <span>Seconds</span>
                <input
                  id="time-seconds"
                  type="text"
                  inputmode="numeric"
                  autocomplete="off"
                  spellcheck="false"
                  placeholder="ss"
                  aria-describedby="time-error"
                />
              </label>
            </div>

            <p class="field-error" id="time-error" aria-live="polite"></p>
          </section>
        </section>

        <section class="projection-strip" aria-label="Common race projections">
          <div class="projection-chip">
            <span>5K</span>
            <strong id="projection-5k">--:--:--</strong>
          </div>
          <div class="projection-chip">
            <span>10K</span>
            <strong id="projection-10k">--:--:--</strong>
          </div>
          <div class="projection-chip">
            <span>Half</span>
            <strong id="projection-half">--:--:--</strong>
          </div>
          <div class="projection-chip">
            <span>Mar</span>
            <strong id="projection-marathon">--:--:--</strong>
          </div>
        </section>

        <section class="split-builder" aria-labelledby="split-builder-title">
          <div class="split-builder__head">
            <div class="split-builder__title">
              <h2 id="split-builder-title">Workout splits</h2>
              <p class="split-builder__summary" id="split-summary">No splits yet</p>
            </div>

            <button
              class="split-action-button"
              id="split-action-button"
              type="button"
            >
              Add split
            </button>
          </div>

          <p class="split-empty-state" id="split-empty-state">
            Add the current calculator values to build a workout.
          </p>

          <ol class="split-list" id="split-list" aria-live="polite"></ol>
        </section>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
